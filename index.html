<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahman | Portfolio</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">S</div>

        <nav class="menu">
            <ul>
                <li class="active">
                    <a href="#"><i class="fas fa-home"></i> Home</a>
                </li>

                <li>
                    <a href="#"><i class="fas fa-user"></i> About</a>
                </li>

                <li>
                    <a href="#"><i class="fas fa-briefcase"></i> Services</a>
                </li>

                <li>
                    <a href="#"><i class="fas fa-folder"></i> Projects</a>
                </li>

                <li>
                    <a href="#"><i class="fas fa-envelope"></i> Contact</a>
                </li>
            </ul>
        </nav>

        <div class="profile">
            <div class="avatar">SH</div>
            <div>
                <h3>Shahman</h3>
                <p>Digital Marketer</p>
            </div>
        </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

        <header>
            <h1>Helping brands grow with strategy & content</h1>
            <p>I build campaigns, content, and digital presence that convert.</p>
        </header>

        <div class="card-container">

            <div class="card">
                <div class="card-icon">
                    <i class="fas fa-bullhorn"></i>
                </div>
                <div>
                    <h3>20+</h3>
                    <p>Campaigns</p>
                </div>
            </div>

            <div class="card">
                <div class="card-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div>
                    <h3>10+</h3>
                    <p>Strategies</p>
                </div>
            </div>

            <div class="card">
                <div class="card-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <h3>5+</h3>
                    <p>Brands</p>
                </div>
            </div>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
