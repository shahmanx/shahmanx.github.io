<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shahman | Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>
<body>
  <div class="bg-particles" id="particles"></div>

  <div class="container">
    <aside class="sidebar">
      <div class="logo"><span>S</span></div>

      <nav class="menu">
        <ul>
          <li class="active"><a href="#"><i class="fas fa-home"></i><span>Home</span></a></li>
          <li><a href="#"><i class="fas fa-user"></i><span>About</span></a></li>
          <li><a href="#"><i class="fas fa-briefcase"></i><span>Services</span></a></li>
          <li><a href="#"><i class="fas fa-folder"></i><span>Projects</span></a></li>
          <li><a href="#"><i class="fas fa-envelope"></i><span>Contact</span></a></li>
        </ul>
      </nav>

      <div class="profile">
        <div class="avatar">SH</div>
        <div class="user-info">
          <h3>Shahman</h3>
          <p>Digital Marketer</p>
        </div>
      </div>
    </aside>

    <main class="content">
      <header>
        <h1>Welcome Back, Shahman</h1>
        <p>Here’s your digital marketing portfolio snapshot</p>
      </header>

      <div class="card-container">
        <div class="card">
          <div class="card-icon"><i class="fas fa-bullhorn"></i></div>
          <div class="card-info">
            <h3>20+</h3>
            <p>Campaigns Built</p>
          </div>
        </div>

        <div class="card">
          <div class="card-icon"><i class="fas fa-chart-line"></i></div>
          <div class="card-info">
            <h3>10+</h3>
            <p>Growth Strategies</p>
          </div>
        </div>

        <div class="card">
          <div class="card-icon"><i class="fas fa-users"></i></div>
          <div class="card-info">
            <h3>5+</h3>
            <p>Brands Worked With</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
